name: Docs Validate

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  docs-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docs layout
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            "docs/README.md"
            "docs/product/overview.md"
            "docs/product/background.md"
            "docs/product/objectives.md"
            "docs/product/principles.md"
            "docs/product/personas.md"
            "docs/product/goals-non-goals.md"
            "docs/runbooks/change-lifecycle.md"
            "docs/runbooks/release.md"
            "changes/README.md"
            "changes/_template/README.md"
            "changes/_template/requirements.md"
            "changes/_template/design.md"
            "changes/_template/plan.md"
            "changes/_template/tasks.md"
          )

          for path in "${required_files[@]}"; do
            [[ -f "$path" ]] || { echo "Missing required file: $path"; exit 1; }
          done

          shopt -s nullglob

          for file in docs/decisions/*.md; do
            base="$(basename "$file")"
            [[ "$base" == "README.md" ]] && continue
            [[ "$base" =~ ^ADR-[0-9]{4}-[a-z0-9-]+\.md$ ]] || {
              echo "Invalid ADR filename: $file (expected ADR-NNNN-slug.md)"
              exit 1
            }
          done

          for file in docs/research/*.md; do
            base="$(basename "$file")"
            [[ "$base" == "README.md" ]] && continue
            [[ "$base" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}-[a-z0-9-]+\.md$ ]] || {
              echo "Invalid research filename: $file (expected YYYY-MM-DD-slug.md)"
              exit 1
            }
          done

          for dir in changes/*/; do
            base="$(basename "$dir")"
            [[ "$base" == "_template" ]] && continue
            [[ "$base" =~ ^([0-9]+-[a-z0-9][a-z0-9-]*|tmp-[a-z0-9][a-z0-9-]*)$ ]] || {
              echo "Invalid change-pack directory name: $dir"
              exit 1
            }
            for name in README.md requirements.md design.md plan.md tasks.md; do
              [[ -f "${dir}${name}" ]] || {
                echo "Missing ${name} in ${dir}"
                exit 1
              }
            done
          done

          echo "All docs validation checks passed."
