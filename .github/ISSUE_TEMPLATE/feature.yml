name: Feature
description: Track a feature or behavior change.
title: "[Feature] "
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: What user or product context makes this worth doing?
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What outcome should exist when this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Concrete checks for done.
      placeholder: "- [ ] ..."
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: What this issue should not expand into.
  - type: textarea
    id: links
    attributes:
      label: Related links
      description: Discussions, PRs, ADRs, research, traces, screenshots.
