name: Bug
description: Track a defect with concrete reproduction and impact.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Exact steps, inputs, environment, and scope.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who is affected and how severe it is.
  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Current mitigation, if any.
  - type: textarea
    id: links
    attributes:
      label: Related links
      description: PRs, traces, logs, screenshots, incidents.
